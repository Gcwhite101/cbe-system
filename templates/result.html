<!DOCTYPE html>
<html>
<head>
    <title>Academic Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard-hero">
    <h1>Academic Result Statement</h1>
</div>

<div class="result-container">

    <h3>Student: {{ session["student"] }}</h3>

    {% if results %}
    <table class="result-table">
        <tr>
            <th>Course Code</th>
            <th>Score</th>
            <th>Status</th>
        </tr>

        {% for r in results %}
        <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
            <td>
                {% if r[1] >= 2 %}
                    <span class="pass">PASS</span>
                {% else %}
                    <span class="fail">FAIL</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <p class="no-result">No examination record found.</p>
    {% endif %}

</div>

<div style="text-align:center; margin-top:30px;">
    <a href="/dashboard" class="logout-btn">Back to Dashboard</a>
</div>

</body>
</html>
